services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: knicks-postgres
    environment:
      POSTGRES_DB: knicks_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_MULTIBYTE: knicks_auth,knicks_products,knicks_orders,knicks_users
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - knicks-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5



  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: knicks-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - knicks-network
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: knicks-grafana
    ports:
      - "3007:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    networks:
      - knicks-network
    depends_on:
      - prometheus
    restart: unless-stopped



  # API Gateway
  gateway:
    build:
      context: ./backend/services/gateway
      dockerfile: Dockerfile
    container_name: knicks-gateway
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - AUTH_SERVICE_URL=http://auth:3002
      - PRODUCTS_SERVICE_URL=http://product-service:3003
      - ORDER_SERVICE_URL=http://order-service:3004
      - ORDERS_SERVICE_URL=http://orders:3005
      - USERS_SERVICE_URL=http://user-service:3006
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knicks-network
    restart: unless-stopped

  # Auth Service
  auth:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
    container_name: knicks-auth
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/knicks_auth
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knicks-network
    restart: unless-stopped

  # Product Service
  product-service:
    build:
      context: ./backend/services/product-service
      dockerfile: Dockerfile
    container_name: knicks-products
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/knicks_products
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knicks-network
    restart: unless-stopped

  # Order Service
  order-service:
    build:
      context: ./backend/services/order-service
      dockerfile: Dockerfile
    container_name: knicks-orders
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/knicks_orders
      - AUTH_SERVICE_URL=http://auth:3002
      - PRODUCT_SERVICE_URL=http://product-service:3003
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
      product-service:
        condition: service_started
    networks:
      - knicks-network
    restart: unless-stopped

  # Orders Service (Order Management)
  orders:
    build:
      context: ./backend/services/orders
      dockerfile: Dockerfile
    container_name: knicks-order-management
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/knicks_orders
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knicks-network
    restart: unless-stopped

  # User Service
  user-service:
    build:
      context: ./backend/services/user-service
      dockerfile: Dockerfile
    container_name: knicks-users
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL=postgresql://postgres:postgres123@postgres:5432/knicks_users
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knicks-network
    restart: unless-stopped

  # Frontend
  frontend:
    image: nginx:alpine
    container_name: knicks-frontend
    volumes:
      - ./frontend/build:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://gateway:3001/api
    depends_on:
      - gateway
    networks:
      - knicks-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  knicks-network:
    driver: bridge
