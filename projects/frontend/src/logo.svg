<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="lgBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#006BB6"/>
      <stop offset="100%" stop-color="#1A2A4F"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#lgBg)"/>
  <!-- Orange triangle (Knicks-style mark) -->
  <polygon points="50,150 100,40 150,150" fill="#F58426"/>
  <!-- Inner blue triangle -->
  <polygon points="65,140 100,65 135,140" fill="#006BB6"/>
  <!-- "NY" wordmark inside -->
  <text x="100" y="120" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="48" fill="#ffffff" letter-spacing="2">NY</text>
  <!-- "KNICKS" beneath -->
  <text x="100" y="180" text-anchor="middle" font-family="Oswald, sans-serif" font-weight="700" font-size="16" fill="#ffffff" letter-spacing="6">KNICKS</text>
</svg>